name: Check Users (temp diagnostic)
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Check users
        run: |
          npx tsx - << 'SCRIPT'
          const CF = 'https://api.cloudflare.com/client/v4';
          async function q(sql, params=[]) {
            const r = await fetch(`${CF}/accounts/${process.env.CF_ACCOUNT}/d1/database/${process.env.CF_DB}/query`, {
              method:'POST', headers:{'Authorization':`Bearer ${process.env.CF_TOKEN}`,'Content-Type':'application/json'},
              body: JSON.stringify({sql,params})
            });
            const d = await r.json();
            return d.result?.[0]?.results ?? [];
          }
          const users = await q(`SELECT u.id, u.email, u.email_verified, u.deleted_at,
            uns.email_alerts, uns.alert_threshold, uns.alert_time,
            ul.city_id, ul.is_primary
          FROM users u
          LEFT JOIN user_notification_settings uns ON uns.user_id = u.id
          LEFT JOIN user_locations ul ON ul.user_id = u.id
          WHERE u.deleted_at IS NULL`);
          console.log(JSON.stringify(users, null, 2));
          SCRIPT
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
          CF_DB: ${{ secrets.D1_DATABASE_ID }}
