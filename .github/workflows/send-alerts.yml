name: Send Pollen Alerts

on:
  schedule:
    # Co godzinę 4–9 UTC (6–11 Warsaw) — każda godzina to jedna porcja alertów
    - cron: '0 4-9 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Wyślij do wszystkich (pomiń filtr godziny i dedup)'
        type: boolean
        default: false

jobs:
  send-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send pollen alerts
        run: |
          ARGS=""
          if [ "${{ inputs.force }}" = "true" ]; then ARGS="--force"; fi
          npx tsx scripts/send-alerts.ts $ARGS
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
